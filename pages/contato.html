<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato | MeuSite</title>

<meta name="description" content="Entre em contato com o MeuSite e solicite um orçamento para seu projeto.">

<meta name="keywords" content="contato, orçamento site, desenvolvimento web contato">

<meta name="author" content="MeuSite">

<meta property="og:title" content="Contato - MeuSite">
<meta property="og:description" content="Fale conosco e tire suas dúvidas.">
<meta property="og:type" content="website">
  <link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/contato.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <nav class="navbar container">
      <h1 class="logo">MeuSite</h1>

      <div class="menu-toggle" onclick="toggleMenu()">
        ☰
      </div>

      <ul class="menu">
        <li><a href="../index.html" class="btn">Home</a></li>
        <li><a href="sobre.html" class="btn">Sobre</a></li>
        <li><a href="servicos.html" class="btn">Serviços</a></li>
        <li><a href="contato.html" class="btn active">Contato</a></li>
      </ul>
    </nav>
  </header>

  <main>

    <!-- HERO -->
    <section class="hero">
      <div class="container">
        <h2>Entre em Contato</h2>
        <p class="p-h">Estamos prontos para ajudar você</p>
      </div>
    </section>

    <!-- FORMULÁRIO -->
    <section class="contato">
      <div class="container">

        <h2>Fale Conosco</h2>

        <form class="form-contato">

          <div class="form-group">
            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Seu nome" required>
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="seu@email.com" required>
          </div>

          <div class="form-group">
            <label for="mensagem">Mensagem</label>
            <textarea id="mensagem" rows="5" placeholder="Digite sua mensagem..." required></textarea>
          </div>

          <button type="submit">Enviar mensagem</button>

        </form>

      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>© 2026 MeuSite - Todos os direitos reservados</p>
    </div>
  </footer>

  <script src="../js/script.js"></script>
</body>
</html>
