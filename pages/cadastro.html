<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - MeuSite</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/contato.css">
</head>

<body>

<header>
  <nav class="navbar">
    <div class="container">
    <h1 class="logo">MeuSite</h1>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="menu">
      <li><a href="../index.html" class="btn">Home</a></li>
      <li><a href="login.html" class="btn">Login</a></li>
      <li><a href="cadastro.html" class="btn active">Cadastro</a></li>
    </ul>
    </div>
  </nav>
</header>

<main>

  <section class="hero">
    <div class="container">
      <h2>Cadastro</h2>
      <p>Crie sua conta</p>
    </div>
  </section>

  <section class="contato">
    <div class="container">

      <form class="form-cadastro">

        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="cad-nome" required>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input type="email" id="cad-email" required>
        </div>

        <div class="form-group">
          <label>Telefone</label>
          <input type="tel" id="cad-telefone" required>
        </div>

        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="cad-senha" required>
        </div>

        <button type="submit">Cadastrar</button>

        <p>Já tem conta? <a href="login.html">Entrar</a></p>

      </form>

    </div>
  </section>

</main>

<footer>
  <div class="container">
    <p>© 2026 MeuSite</p>
  </div>
</footer>

<script src="../js/script.js"></script>
</body>
</html>
