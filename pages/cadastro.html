<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - MeuSite</title>
  <link rel="stylesheet" href="../css/auth.css">
</head>

<body>

<main>
  <section class="auth-page">
    <div class="auth-shell">
      <div class="auth-panel"></div>
      <div class="auth-form-side">
        <div class="auth-copy">
          <h2>Cadastro</h2>
          <p>Crie sua conta</p>
        </div>

        <form class="auth-form">
          <div class="form-group">
            <label>Nome</label>
            <input type="text" id="cad-nome" required>
          </div>

          <div class="form-group">
            <label>Email</label>
            <input type="email" id="cad-email" required>
          </div>

          <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="cad-telefone" required>
          </div>

          <div class="form-group">
            <label>Senha</label>
            <input type="password" id="cad-senha" required>
          </div>

          <button type="submit">Cadastrar</button>
          <p>Ja tem conta? <a href="login.html">Entrar</a></p>
        </form>
      </div>
    </div>
  </section>
</main>

<script src="../js/script.js"></script>
</body>
</html>
